name: sign-file_test

on:
  push:
    paths:
      - '.github/workflows/sign-file_test.yml'
      - 'sign-file/**'

jobs:
  sign-file_test:
    strategy:
      matrix:
        os: [windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - id: generate-certificate
        shell: pwsh
        run: |
          $password = ConvertTo-SecureString 'test' -AsPlainText -Force
          $cert = New-SelfSignedCertificate `
            -Type CodeSigningCert `
            -Subject 'CN=exivity-actions-sign-file-test' `
            -CertStoreLocation 'Cert:\CurrentUser\My' `
            -KeyExportPolicy Exportable `
            -HashAlgorithm SHA256 `
            -NotAfter (Get-Date).AddYears(2)

          $pfxPath = Join-Path $env:RUNNER_TEMP 'sign-file-test.pfx'
          Export-PfxCertificate -Cert $cert -FilePath $pfxPath -Password $password | Out-Null

          $base64 = [Convert]::ToBase64String([IO.File]::ReadAllBytes($pfxPath))
          "certificate_base64=$base64" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

          Remove-Item -Path "Cert:\CurrentUser\My\$($cert.Thumbprint)"

      - uses: ./sign-file
        with:
          path: fixtures/hello/build/*.exe
          certificate-base64:
            ${{ steps.generate-certificate.outputs.certificate_base64 }}
          certificate-password: test
